name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write
  checks: write
  pull-requests: write
  id-token: write  # Required for OIDC

jobs:
  get-version:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-build
      cancel-in-progress: true
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Get version
        id: tag
        uses: rorybartie/github-tag-action@bugfix/duplicate-prefix-on-prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_PREFIX: v
          DEFAULT_BUMP: patch
          MAJOR_STRING_TOKEN: feat!
          MINOR_STRING_TOKEN: feat
          PRERELEASE: ${{ !!github.event.pull_request }}
          PRERELEASE_SUFFIX: prerelease
          VERBOSE: true

  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-build
      cancel-in-progress: true
    needs: get-version
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup tools
        run: |
          npm install -g bats

      - name: Tests
        run: |
          mkdir test-results
          bats . --verbose-run --print-output-on-failure --report-formatter junit --output test-results

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            test-results/*.xml

      - name: Restore dependencies
        run: dotnet restore

      - name: Build package
        env:
          VERSION: ${{ needs.get-version.outputs.tag }}
        run: |
          dotnet build --configuration Release --no-restore -p:Version=${VERSION:1}

      # Trusted Publishing with OIDC (runs on main branch pushes)
      - name: NuGet login (OIDC → temp API key)
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish package to NuGet.org
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          dotnet nuget push "bin/Release/*.nupkg" \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
